<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vantage - Control de Gastos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" />
    <style>
      /* Splash screen — los colores los pone el script inline según el tema activo */
      #vantage-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--splash-bg, #EDE8E1);
        color: var(--splash-text, #2A2520);
        font-family: 'DM Sans', system-ui, sans-serif;
        transition: opacity 420ms ease-out, visibility 420ms;
      }
      #vantage-splash.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-logo {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        background: linear-gradient(135deg, var(--splash-brand, #FF7A59), var(--splash-accent, #6B5BFF));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 32px var(--splash-shadow, rgba(60, 40, 30, 0.18));
        animation: splash-pop 600ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 38px;
        color: #FFFFFF;
        font-weight: 700;
      }
      .splash-name {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
        opacity: 0;
        animation: splash-fade-in 560ms ease-out 200ms both;
      }
      .splash-tagline {
        font-size: 13px;
        opacity: 0;
        color: var(--splash-muted, #7A7065);
        animation: splash-fade-in 560ms ease-out 360ms both;
      }
      .splash-pulse {
        width: 32px; height: 4px;
        margin-top: 12px;
        border-radius: 2px;
        background: linear-gradient(90deg, transparent, var(--splash-brand, #FF7A59), transparent);
        background-size: 200% 100%;
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      @keyframes splash-pop {
        from { opacity: 0; transform: scale(0.5) rotate(-12deg); }
        to   { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-pulse {
        0%, 100% { background-position: 100% 50%; }
        50%      { background-position: -100% 50%; }
      }
    </style>
  </head>
  <body>
    <script>
      (function(){
        var t = localStorage.getItem('vantage-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);

        // Tematizar splash según tema activo
        var palettes = {
          'clay-light':                { bg: '#EDE8E1', text: '#2A2520', muted: '#7A7065', brand: '#FF7A59', accent: '#6B5BFF', shadow: 'rgba(60,40,30,0.18)' },
          'clay-dark':                 { bg: '#1F1B1A', text: '#F5F0EA', muted: '#A89D90', brand: '#FF8C73', accent: '#8676FF', shadow: 'rgba(0,0,0,0.5)' },
          'clay-botanical-light':      { bg: '#EFE8D5', text: '#2D3818', muted: '#6B6E50', brand: '#5B7A3A', accent: '#B85C2E', shadow: 'rgba(45,56,24,0.18)' },
          'clay-botanical-dark':       { bg: '#1A1F12', text: '#EAE6D2', muted: '#A8AC85', brand: '#98B864', accent: '#D8896A', shadow: 'rgba(0,0,0,0.5)' },
          'clay-tea-light':            { bg: '#F4EBDC', text: '#1F1B16', muted: '#6B5E48', brand: '#B91D1D', accent: '#5C7A3C', shadow: 'rgba(31,27,22,0.18)' },
          'clay-tea-dark':             { bg: '#1A1614', text: '#EFE6D5', muted: '#A89E85', brand: '#E63838', accent: '#95B069', shadow: 'rgba(0,0,0,0.5)' },
          'clay-mediterranean-light':  { bg: '#F4EFE6', text: '#1B3A5C', muted: '#5C7088', brand: '#1B5E8C', accent: '#C9A24E', shadow: 'rgba(27,58,92,0.18)' },
          'clay-mediterranean-dark':   { bg: '#0F1F2E', text: '#EFE8D5', muted: '#8FA2B8', brand: '#5BA0CB', accent: '#FFD580', shadow: 'rgba(0,0,0,0.5)' },
          'corporativo':               { bg: '#F7F6F5', text: '#2D2D2F', muted: '#6B6B6F', brand: '#7A1B2D', accent: '#C9A84C', shadow: 'rgba(0,0,0,0.18)' }
        };
        var p = palettes[t] || palettes['clay-light'];
        var r = document.documentElement;
        r.style.setProperty('--splash-bg', p.bg);
        r.style.setProperty('--splash-text', p.text);
        r.style.setProperty('--splash-muted', p.muted);
        r.style.setProperty('--splash-brand', p.brand);
        r.style.setProperty('--splash-accent', p.accent);
        r.style.setProperty('--splash-shadow', p.shadow);
      })();
    </script>
    <div id="vantage-splash" aria-hidden="true">
      <div class="splash-logo">V</div>
      <div class="splash-name">Vantage</div>
      <div class="splash-tagline">Control de gastos</div>
      <div class="splash-pulse"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

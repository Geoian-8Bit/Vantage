appId: com.vantage.app
productName: Vantage
directories:
  output: dist-electron
  buildResources: build

# Solo los archivos compilados — sin duplicar el WASM (va en extraResources)
files:
  - out/**/*
  - package.json

win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Vantage
  deleteAppDataOnUninstall: false

# LZMA: mejor ratio compresión, reduce el instalador ~30-40%
compression: maximum

# asar empaqueta todo el código en un único archivo binario
asar: true
# El WASM no puede ir dentro del asar (necesita path real en disco)
asarUnpack:
  - "**/*.wasm"

# El WASM fuera del asar, en resources/ — accesible en tiempo de ejecución
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
